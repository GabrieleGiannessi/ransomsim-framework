networks:
  ransomsim_blue:
    driver: bridge

services:
  agent:
    image: alpine:latest
    container_name: caldera_agent_blue
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    networks:
      - ransomsim_blue
    depends_on:
      - api
    restart: on-failure
    environment:
      - CALDERA_URL=${CALDERA_URL:-http://host.docker.internal:8888}
    volumes:
      - ../:/app
    command: >
      sh -c "apk add --no-cache curl openssl &&
      while true; do
        HTTP_STATUS=$$(curl -s -o sandcat.go -w '%{http_code}' -X POST -H 'file:sandcat.go' -H 'platform:linux' $${CALDERA_URL}/file/download);
        if [ \"$$HTTP_STATUS\" = '200' ] && [ -s sandcat.go ]; then
          echo 'Agent downloaded successfully.';
          break;
        fi;
        echo \"Waiting for Caldera at $${CALDERA_URL}... (status: $$HTTP_STATUS)\";
        rm -f sandcat.go;
        sleep 5;
      done &&
      chmod +x sandcat.go &&
      ./sandcat.go -server $${CALDERA_URL} -group red_team"

  api:
    image: ghcr.io/astral-sh/uv:python3.10-bookworm-slim
    container_name: api_blue
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ransomsim_blue
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      - CALDERA_URL=${CALDERA_URL:-http://host.docker.internal:8888}
      - CALDERA_API_KEY=ADMIN123
    volumes:
      - ../:/app
    command: >
      sh -c "uv sync &&
      uv run uvicorn api.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-alpine
    container_name: frontend_blue
    networks:
      - ransomsim_blue
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ../frontend:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # -------------------------------------------------------------------------
  # Suricata IDS — Blue Team Network Monitor
  # Sniffa il traffico della ransomsim_blue network e invia alert all'API
  # -------------------------------------------------------------------------
  suricata:
    image: jasonish/suricata:latest
    container_name: suricata_blue
    network_mode: "service:api"   # condivide la network stack dell'API per sniffare tutto il traffico blue
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    environment:
      - API_URL=http://127.0.0.1:8000  # stesso host poiche' condivide il network namespace
      - SURICATA_IFACE=eth0
      - SURICATA_POLL_INTERVAL=${SURICATA_POLL_INTERVAL:-15}
    volumes:
      - ./suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./suricata/rules:/etc/suricata/rules:ro
      - suricata_logs:/var/log/suricata
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    # Monta lo script di entrypoint custom
    configs:
      - source: suricata_entrypoint
        target: /entrypoint.sh
        mode: 0755
    depends_on:
      - api
    restart: unless-stopped

configs:
  suricata_entrypoint:
    file: ./suricata/entrypoint.sh

volumes:
  suricata_logs:
    driver: local
