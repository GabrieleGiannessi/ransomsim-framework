events {
    worker_connections 1024;
}

http {
    # Upstream definitions pointing to internal containers
    upstream frontend_upstream {
        server 10.10.2.20:5173;
    }

    upstream api_upstream {
        server 10.10.2.30:8000;
    }

    server {
        listen 80;
        server_name _;

        # API requests proxied to FastAPI backend
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket endpoints for live logs and IDS alerts
        location ~ ^/api/(sim/ws/|alerts/ws) {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Everything else goes to the frontend
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Vite HMR WebSocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
