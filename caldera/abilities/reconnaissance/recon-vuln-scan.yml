- id: "recon-vuln-scan"
  name: "Vulnerability Assessment"
  description: "Identifies potential vulnerabilities on discovered services."
  tactic: "reconnaissance"
  technique:
    attack_id: "T1595.002"
    name: "Active Scanning: Vulnerability Scanning"
  platforms:
    linux:
      sh:
        command: |
          OUTDIR="/tmp/recon"; mkdir -p "$OUTDIR"; echo "[*] Running Nmap vuln scripts against DMZ..."; nmap --script vuln -p 80,8000 10.10.2.10 10.10.2.30 -oN "$OUTDIR/nmap_vuln.txt" 2>/dev/null; echo "[*] Probing for common web vulnerabilities..."; for TARGET in 10.10.2.10 10.10.2.30; do echo "--- Checking $TARGET ---"; CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 "http://$TARGET:8000/legacy/ping?host=localhost"); echo "  /legacy/ping -> HTTP $CODE"; CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 "http://$TARGET:8000/legacy/search?q=test"); echo "  /legacy/search -> HTTP $CODE"; CODE=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 3 "http://$TARGET:8000/docs"); echo "  /docs (Swagger) -> HTTP $CODE"; done | tee "$OUTDIR/web_probe.txt"; echo "[+] Vulnerability scan complete"; echo "--- Nmap Vuln Results ---"; cat "$OUTDIR/nmap_vuln.txt" 2>/dev/null || echo "No nmap vuln results"
