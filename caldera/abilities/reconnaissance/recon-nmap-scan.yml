- id: "recon-nmap-scan"
  name: "Network Reconnaissance via Nmap"
  description: "Scans the target network to discover live hosts and open services."
  tactic: "reconnaissance"
  technique:
    attack_id: "T1595.001"
    name: "Active Scanning: Scanning IP Blocks"
  platforms:
    linux:
      sh:
        command: |
          OUTDIR="/tmp/recon"; mkdir -p "$OUTDIR"; echo "[*] Phase 1: Host Discovery on DMZ (10.10.2.0/24)"; nmap -sn -T4 -n --max-retries 0 --host-timeout 10s -PS80,443 10.10.2.0/24 -oG "$OUTDIR/hosts_alive.txt" 2>/dev/null; echo "[*] Phase 2: Service Scan on internal net (10.10.3.0/24)"; nmap -sV -T4 -n -p 22,80,443,8000,8080,8443,8888 --max-retries 0 --host-timeout 30s 10.10.2.0/24 10.10.3.0/24 -oN "$OUTDIR/service_scan.txt" --open 2>/dev/null; echo "[*] Phase 3: Web Service Fingerprint"; nmap -T4 -n --script http-title,http-headers -p 80,8000,8080 --max-retries 0 --host-timeout 30s 10.10.2.0/24 10.10.3.0/24 -oN "$OUTDIR/web_fingerprint.txt" 2>/dev/null; echo "[+] Recon complete. Results saved to $OUTDIR/"; echo "--- Service Scan Results ---"; cat "$OUTDIR/service_scan.txt" 2>/dev/null || echo "No service scan results"; echo "--- Live Hosts ---"; cat "$OUTDIR/hosts_alive.txt" 2>/dev/null || echo "No host scan results"
