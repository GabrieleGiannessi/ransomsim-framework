- id: "discovery-enum-api"
  name: "Enumerate API Endpoints"
  description: "Discovers available API endpoints on the healthcare system."
  tactic: "discovery"
  technique:
    attack_id: "T1046"
    name: "Network Service Discovery"
  platforms:
    linux:
      sh:
        command: |
          OUTDIR="/tmp/recon"; API_BASE="#{api.scheme}://#{api.host}:#{api.port}"; mkdir -p "$OUTDIR"; echo "Targeting $API_BASE"; for e in "/docs/" "/patients/" "/users/" "/admin/" "/records/"; do CODE=$(curl -s -L -o "$OUTDIR/resp_$(echo $e | tr '/' '_').html" -w "%{http_code}" --connect-timeout 5 "$API_BASE$e"); echo "$e -> $CODE" >> "$OUTDIR/enum_results.txt"; done; cat "$OUTDIR/enum_results.txt"