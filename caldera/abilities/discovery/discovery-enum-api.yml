- id: "discovery-enum-api"
  name: "Enumerate API Endpoints"
  description: "Discovers available API endpoints on the healthcare system."
  tactic: "discovery"
  technique:
    attack_id: "T1046"
    name: "Network Service Discovery"
  platforms:
    linux:
      sh:
        command: |
          OUTDIR="/tmp/recon"; API_BASE="#{api.scheme}://#{api.host}:#{api.port}"; mkdir -p "$OUTDIR"; echo "[*] Enumerating API at $API_BASE"; for e in "/docs" "/patients" "/legacy/ping" "/legacy/search" "/sim/status" "/sim/adversaries"; do CODE=$(curl -s -L -o "$OUTDIR/resp_$(echo $e | tr '/' '_').html" -w "%{http_code}" --connect-timeout 5 "$API_BASE$e"); echo "$e -> HTTP $CODE" | tee -a "$OUTDIR/enum_results.txt"; done; echo "[+] Enumeration complete"; cat "$OUTDIR/enum_results.txt"