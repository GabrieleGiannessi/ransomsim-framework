- id: "discovery-enum-api"
  name: "Enumerate API Endpoints"
  description: "Discovers available API endpoints on the healthcare system."
  tactic: "discovery"
  technique:
    attack_id: "T1046"
    name: "Network Service Discovery"
  platforms:
    linux:
      sh:
        command: |
          OUTDIR="/tmp/recon"
          API_BASE="#{api.scheme}://#{api.host}:#{api.port}"
          mkdir -p "${OUTDIR}"
          for endpoint in /docs /patients /users /admin /records; do
            RESP_FILE="${OUTDIR}/resp_$(echo "${endpoint}" | tr '/' '_').html"
            CODE=$(curl -s -o "${RESP_FILE}" -w "%{http_code}" --connect-timeout 5 --max-time 10 "${API_BASE}${endpoint}")
            if [ "${CODE}" = "000" ]; then
              echo "${endpoint} -> UNREACHABLE (connection failed)" >> "${OUTDIR}/enum_results.txt"
            elif [ "${CODE}" -ge 400 ]; then
              echo "${endpoint} -> ${CODE} (error)" >> "${OUTDIR}/enum_results.txt"
            else
              echo "${endpoint} -> ${CODE} (ok)" >> "${OUTDIR}/enum_results.txt"
            fi
          done
          echo "Enumeration complete. Results in ${OUTDIR}/enum_results.txt"
          cat "${OUTDIR}/enum_results.txt"